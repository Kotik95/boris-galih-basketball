<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boris vs. Galih Basketball</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #161616;
      color: #fff;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .wrap { width: min(940px, 100%); }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 40px); }
    .panel {
      background: #222;
      border: 1px solid #3a3a3a;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      display: grid;
      gap: 10px;
    }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    label { color: #ddd; }
    input {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 210px;
      font-size: 16px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #f5c542;
      color: #1a1a1a;
    }
    button.secondary { background: #e7e7e7; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    #status { color: #e9e9e9; min-height: 24px; }
    .gameArea { position: relative; }
    canvas {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 900 / 520;
      display: block;
      border-radius: 18px;
      border: 4px solid #3b2112;
      background: #b56b32;
      box-shadow: 0 20px 70px rgba(0,0,0,.35);
    }
    .winner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      border-radius: 18px;
      background: rgba(0,0,0,.55);
      text-align: center;
      font-size: clamp(38px, 8vw, 74px);
      font-weight: 900;
      letter-spacing: 1px;
    }
    .small { font-size: 14px; color: #cfcfcf; line-height: 1.45; }
    code { background: #111; padding: 2px 5px; border-radius: 5px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Boris vs. Galih Basketball</h1>

    <section class="panel">
      <div class="row">
        <label for="room">Room:</label>
        <input id="room" value="boris-galih" maxlength="40" />
        <button id="joinBoris">I am Boris</button>
        <button id="joinGalih">I am Galih</button>
        <button id="reset" class="secondary">New Round</button>
      </div>
      <div id="status">Connecting to Firebase …</div>
      <div class="small">
        Controls: Arrow keys or WASD. Boris should click “I am Boris” on his Mac. Galih should click “I am Galih” on her device.
      </div>
    </section>

    <section class="gameArea">
      <canvas id="court" width="900" height="520"></canvas>
      <div id="winnerBox" class="winner">
        <div id="winnerText">Winner</div>
        <button id="resetBig">New Round</button>
      </div>
    </section>
  </main>

    };

    const playerSprites = {
      boris: { img: new Image(), w: 58, h: 100, yOffset: 54 },
      galih: { img: new Image(), w: 72, h: 98, yOffset: 52 }
    };
    playerSprites.boris.img.src = spriteSources.boris;
    playerSprites.galih.img.src = spriteSources.galih;
    const spawns = {
      boris: { x: 210, y: H / 2 },
      galih: { x: W - 210, y: H / 2 }
    };

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function cleanRoomId(value) {
      return (value || "boris-galih")
        .trim()
        .toLowerCase()
        .replace(/[.#$\[\]\/]/g, "-")
        .replace(/\s+/g, "-")
        .slice(0, 40) || "boris-galih";
    }

    function newBall() {
      const b = {
        x: W / 2,
        y: H / 2,
        vx: 0,
        vy: 0,
        r: BALL_R,
        spin: 0,
        nextTurnAt: Date.now() + 450
      };
      randomizeBall(b);
      return b;
    }

    function randomizeBall(ball) {
      const speed = 230 + Math.random() * 145;
      const angle = Math.random() * Math.PI * 2;
      ball.vx = Math.cos(angle) * speed;
      ball.vy = Math.sin(angle) * speed;
      ball.nextTurnAt = Date.now() + 250 + Math.random() * 650;
    }

    function swerveBall(ball, hard = false) {
      const speed = hard ? 250 + Math.random() * 160 : 220 + Math.random() * 150;
      const oldAngle = Math.atan2(ball.vy || 1, ball.vx || 1);
      const turn = (Math.random() - 0.5) * (hard ? 2.3 : 1.55);
      const angle = oldAngle + turn;
      ball.vx = Math.cos(angle) * speed;
      ball.vy = Math.sin(angle) * speed;
      ball.nextTurnAt = Date.now() + 240 + Math.random() * 620;
    }

    onAuthStateChanged(auth, user => {
      if (user) {
        uid = user.uid;
        resolveAuthReady(user);
        setStatus("Connected. Choose your role.");
      }
    });

    signInAnonymously(auth).catch(err => {
      setStatus("Firebase login failed: " + err.message);
    });

    document.addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(k)) {
        e.preventDefault();
        keys[k] = true;
      }
    });

    document.addEventListener("keyup", e => {
      keys[e.key.toLowerCase()] = false;
    });

    document.getElementById("joinBoris").addEventListener("click", () => joinRole("boris"));
    document.getElementById("joinGalih").addEventListener("click", () => joinRole("galih"));
    document.getElementById("reset").addEventListener("click", resetRound);
    document.getElementById("resetBig").addEventListener("click", resetRound);

    async function joinRole(role) {
      await authReady;

      currentRoom = cleanRoomId(roomInput.value);
      roomInput.value = currentRoom;
      const spawn = spawns[role];
      const chosenPlayerRef = ref(db, `rooms/${currentRoom}/players/${role}`);

      setStatus(`${names[role]} is joining room “${currentRoom}” …`);

      const result = await runTransaction(chosenPlayerRef, current => {
        if (current && current.online === true && current.uid !== uid) {
          return; // Role is taken.
        }
        return {
          uid,
          name: names[role],
          x: spawn.x,
          y: spawn.y,
          online: true
        };
      });

      if (!result.committed) {
        setStatus(`${names[role]} is already taken. Choose the other role or wait until that player is offline.`);
        return;
      }

      localRole = role;
      playerRef = chosenPlayerRef;
      localPlayer = { ...result.snapshot.val() };
      await onDisconnect(playerRef).update({ online: false });
      await update(ref(db, `rooms/${currentRoom}`), { createdAt: Date.now() });

      listenToRoom();
      await ensureBallExists();

      document.getElementById("joinBoris").disabled = true;
      document.getElementById("joinGalih").disabled = true;
      setStatus(`You are playing as ${names[role]}. Send the link to the other person and use the same room.`);
    }

    function listenToRoom() {
      if (unsubscribeRoom) unsubscribeRoom();
      unsubscribeRoom = onValue(ref(db, `rooms/${currentRoom}`), snap => {
        state = snap.val() || { players: {}, ball: null, winner: null };

        if (localRole === "boris" && state.ball && !hostBall) {
          hostBall = { ...state.ball };
        }

        if (state.winner) {
          winnerText.textContent = `${state.winner.name} Winner`;
          winnerBox.style.display = "flex";
          setStatus(`${state.winner.name} Winner`);
        } else {
          winnerBox.style.display = "none";
        }
      });
    }

    async function ensureBallExists() {
      const ballSnap = await get(ref(db, `rooms/${currentRoom}/ball`));
      if (!ballSnap.exists()) {
        const ball = newBall();
        hostBall = localRole === "boris" ? { ...ball } : null;
        await set(ref(db, `rooms/${currentRoom}/ball`), ball);
      }
    }

    async function resetRound() {
      if (!currentRoom) {
        setStatus("Join a room first, then you can start a new round.");
        return;
      }
      const ball = newBall();
      hostBall = localRole === "boris" ? { ...ball } : null;
      await set(ref(db, `rooms/${currentRoom}/winner`), null);
      await set(ref(db, `rooms/${currentRoom}/ball`), ball);
      setStatus("New round started. Catch the ball!");
    }

    function updateLocalPlayer(dt, now) {
      if (!localRole || !localPlayer || state.winner) return;

      let dx = 0;
      let dy = 0;
      if (keys.arrowleft || keys.a) dx -= 1;
      if (keys.arrowright || keys.d) dx += 1;
      if (keys.arrowup || keys.w) dy -= 1;
      if (keys.arrowdown || keys.s) dy += 1;

      if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        dx /= len;
        dy /= len;
        localPlayer.x = clamp(localPlayer.x + dx * PLAYER_SPEED * dt, PLAYER_R + 7, W - PLAYER_R - 7);
        localPlayer.y = clamp(localPlayer.y + dy * PLAYER_SPEED * dt, PLAYER_R + 7, H - PLAYER_R - 7);
      }

      if (now - lastSend > SEND_EVERY_MS) {
        lastSend = now;
        update(playerRef, {
          uid,
          name: names[localRole],
          x: Math.round(localPlayer.x),
          y: Math.round(localPlayer.y),
          online: true
        }).catch(err => setStatus("Player update failed: " + err.message));
      }
    }

    function updateHostBall(dt, now) {
      if (localRole !== "boris" || state.winner) return;
      if (!hostBall) hostBall = state.ball ? { ...state.ball } : newBall();

      hostBall.x += hostBall.vx * dt;
      hostBall.y += hostBall.vy * dt;
      hostBall.spin = (hostBall.spin || 0) + Math.hypot(hostBall.vx, hostBall.vy) * dt / 20;

      let bounced = false;
      if (hostBall.x < BALL_R + 6) {
        hostBall.x = BALL_R + 6;
        hostBall.vx = Math.abs(hostBall.vx);
        bounced = true;
      }
      if (hostBall.x > W - BALL_R - 6) {
        hostBall.x = W - BALL_R - 6;
        hostBall.vx = -Math.abs(hostBall.vx);
        bounced = true;
      }
      if (hostBall.y < BALL_R + 6) {
        hostBall.y = BALL_R + 6;
        hostBall.vy = Math.abs(hostBall.vy);
        bounced = true;
      }
      if (hostBall.y > H - BALL_R - 6) {
        hostBall.y = H - BALL_R - 6;
        hostBall.vy = -Math.abs(hostBall.vy);
        bounced = true;
      }

      if (bounced) swerveBall(hostBall, true);
      if (Date.now() > (hostBall.nextTurnAt || 0) || Math.random() < 0.012) {
        swerveBall(hostBall, false);
      }

      if (now - lastBallSend > SEND_EVERY_MS) {
        lastBallSend = now;
        set(ref(db, `rooms/${currentRoom}/ball`), {
          x: Number(hostBall.x.toFixed(1)),
          y: Number(hostBall.y.toFixed(1)),
          vx: Number(hostBall.vx.toFixed(1)),
          vy: Number(hostBall.vy.toFixed(1)),
          r: BALL_R,
          spin: Number((hostBall.spin || 0).toFixed(3)),
          nextTurnAt: hostBall.nextTurnAt || Date.now() + 500
        }).catch(err => setStatus("Ball update failed: " + err.message));
      }
    }

    function checkCatch() {
      if (!localRole || !localPlayer || state.winner || claimingWinner) return;
      const ball = localRole === "boris" && hostBall ? hostBall : state.ball;
      if (!ball) return;

      const distance = Math.hypot(localPlayer.x - ball.x, localPlayer.y - ball.y);
      if (distance < PLAYER_R + BALL_R - 4) {
        claimWinner();
      }
    }

    async function claimWinner() {
      claimingWinner = true;
      try {
        const winRef = ref(db, `rooms/${currentRoom}/winner`);
        const result = await runTransaction(winRef, current => {
          if (current) return current;
          return {
            role: localRole,
            name: names[localRole],
            time: Date.now()
          };
        });
        const winner = result.snapshot.val();
        if (winner) setStatus(`${winner.name} Winner`);
      } finally {
        claimingWinner = false;
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function render() {
      drawCourt();

      const ball = localRole === "boris" && hostBall ? hostBall : state.ball;
      if (ball) drawBall(ball);

      drawPlayer("boris", getPlayerForDraw("boris"));
      drawPlayer("galih", getPlayerForDraw("galih"));

      drawScoreHint();
    }

    function getPlayerForDraw(role) {
      if (role === localRole && localPlayer) return localPlayer;
      return state.players ? state.players[role] : null;
    }

    function drawCourt() {
      ctx.clearRect(0, 0, W, H);

      ctx.fillStyle = "#b96b31";
      ctx.fillRect(0, 0, W, H);

      // Parkettlinien
      ctx.strokeStyle = "rgba(90, 43, 18, .22)";
      ctx.lineWidth = 2;
      for (let x = 20; x < W; x += 42) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + 22, H);
        ctx.stroke();
      }

      // Court lines
      ctx.strokeStyle = "rgba(255,255,255,.85)";
      ctx.lineWidth = 4;
      roundRect(22, 22, W - 44, H - 44, 10, false, true);

      ctx.beginPath();
      ctx.moveTo(W / 2, 22);
      ctx.lineTo(W / 2, H - 22);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 62, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeRect(22, H / 2 - 82, 115, 164);
      ctx.strokeRect(W - 137, H / 2 - 82, 115, 164);

      ctx.beginPath();
      ctx.arc(137, H / 2, 65, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(W - 137, H / 2, 65, Math.PI / 2, Math.PI * 1.5);
      ctx.stroke();

      // Körbe
      ctx.fillStyle = "rgba(20,20,20,.7)";
      ctx.fillRect(48, H / 2 - 34, 10, 68);
      ctx.fillRect(W - 58, H / 2 - 34, 10, 68);
      ctx.strokeStyle = "#ffdf7a";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(72, H / 2, 18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(W - 72, H / 2, 18, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawBall(ball) {
      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.rotate(ball.spin || 0);
      ctx.fillStyle = "#f08a22";
      ctx.beginPath();
      ctx.arc(0, 0, ball.r || BALL_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,.55)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-(ball.r || BALL_R), 0);
      ctx.lineTo(ball.r || BALL_R, 0);
      ctx.moveTo(0, -(ball.r || BALL_R));
      ctx.lineTo(0, ball.r || BALL_R);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-(ball.r || BALL_R) * .55, 0, (ball.r || BALL_R) * .8, -Math.PI / 2, Math.PI / 2);
      ctx.arc((ball.r || BALL_R) * .55, 0, (ball.r || BALL_R) * .8, Math.PI / 2, Math.PI * 1.5);
      ctx.stroke();
      ctx.restore();
    }

    function drawPlayer(role, player) {
      if (!player) return;
      const online = player.online !== false;
      const sprite = playerSprites[role];
      const isLocal = role === localRole;

      ctx.save();
      ctx.globalAlpha = online ? 1 : .38;

      // Small shadow so the pixel characters stand clearly on the court.
      ctx.fillStyle = "rgba(0,0,0,.28)";
      ctx.beginPath();
      ctx.ellipse(player.x, player.y + 26, 27, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // Highlight your own character.
      if (isLocal) {
        ctx.strokeStyle = "rgba(255,255,255,.95)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(player.x, player.y + 4, PLAYER_R + 10, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (sprite && sprite.img.complete && sprite.img.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(
          sprite.img,
          player.x - sprite.w / 2,
          player.y - sprite.yOffset,
          sprite.w,
          sprite.h
        );
      } else {
        // Fallback while the images are loading.
        ctx.fillStyle = role === "boris" ? "#2d74ff" : "#ef4f9a";
        ctx.beginPath();
        ctx.arc(player.x, player.y, PLAYER_R, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "#fff";
      ctx.font = "bold 15px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.strokeStyle = "rgba(0,0,0,.65)";
      ctx.lineWidth = 4;
      ctx.strokeText(names[role], player.x, player.y - sprite.yOffset - 8);
      ctx.fillText(names[role], player.x, player.y - sprite.yOffset - 8);
      ctx.restore();
    }

    function drawScoreHint() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.45)";
      roundRect(W / 2 - 185, 12, 370, 34, 12, true, false);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 17px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("First to reach the basketball wins", W / 2, 35);
      ctx.restore();
    }

    function roundRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function loop(now) {
      const dt = Math.min((now - lastFrame) / 1000, 0.05);
      lastFrame = now;

      updateLocalPlayer(dt, now);
      updateHostBall(dt, now);
      checkCatch();
      render();

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
